<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CVR AMP Controller</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        user-select: none;
      }

      .logo {
        width: 96px;
        height: 96px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.05s forwards;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
        color: #fafafa;
        letter-spacing: -0.3px;
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.15s forwards;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #27272a;
        border-top-color: #71717a;
        border-radius: 50%;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.25s forwards, spin 0.85s linear 0.25s infinite;
      }

      @keyframes spin   { to { transform: rotate(360deg); } }
      @keyframes fadeIn { to { opacity: 1; } }
    </style>
  </head>
  <body>
    <img class="logo" src="../public/logo.ico" alt="" />
    <div class="title">AMP Controller</div>
    <div class="spinner"></div>
  </body>
</html>
