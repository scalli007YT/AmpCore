<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>AmpCore</title>
    <style>
      :root {
        --color-window-bg: #121212;
        --color-splash-text: #ececec;
        --color-splash-border: #2b2b2b;
        --color-splash-border-top: #686868;
        --color-splash-status: #9d9d9d;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --color-window-bg: #f5f5f5;
          --color-splash-text: #2b2b2b;
          --color-splash-border: #d6d6d6;
          --color-splash-border-top: #8f8f8f;
          --color-splash-status: #666666;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--color-window-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        user-select: none;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      body.fading-out {
        opacity: 0;
      }

      .logo {
        width: 96px;
        height: 96px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.05s forwards;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
        color: var(--color-splash-text);
        letter-spacing: -0.3px;
        margin-bottom: 8px;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.15s forwards;
      }

      .version {
        margin-bottom: 40px;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--color-splash-status);
        opacity: 0;
        animation: fadeIn 0.35s ease 0.2s forwards;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid var(--color-splash-border);
        border-top-color: var(--color-splash-border-top);
        border-radius: 50%;
        opacity: 0;
        animation:
          fadeIn 0.35s ease 0.25s forwards,
          spin 0.85s linear 0.25s infinite;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
        white-space: nowrap;
      }

      @media (prefers-reduced-motion: reduce) {
        body {
          transition: none;
        }

        .logo,
        .title,
        .version,
        .spinner {
          opacity: 1;
          animation: none;
        }
      }

      @media (forced-colors: active) {
        .spinner {
          border-color: GrayText;
          border-top-color: CanvasText;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body role="status" aria-live="polite" aria-busy="true">
    <img class="logo" src="../public/logo.ico" alt="AmpCore logo" draggable="false" />
    <div id="app-name" class="title">AmpCore</div>
    <div id="app-version" class="version">v0.0.0</div>
    <div class="spinner" aria-hidden="true"></div>
    <div class="sr-only">Loading application</div>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const name = params.get("name") || "AmpCore";
        const version = params.get("version") || "0.0.0";

        const nameEl = document.getElementById("app-name");
        const versionEl = document.getElementById("app-version");

        if (nameEl) {
          nameEl.textContent = name;
          document.title = name;
        }

        if (versionEl) {
          versionEl.textContent = `v${version}`;
        }
      })();

      // Keep API for callers, but intentionally render no status text on splash.
      window.setSplashStatus = () => {};

      window.startFadeOut = () => {
        const durationMs = 220;
        document.body.setAttribute("aria-busy", "false");
        document.body.classList.add("fading-out");
        return durationMs;
      };
    </script>
  </body>
</html>
